# ekf.yaml
# robot_localization EKF configuration for Loki AUV.
# Fuses: ICM45686 IMU + Cerulean DVL + depth sensor
#
# Sensor topics (to be confirmed with hardware team):
#   /imu/data          sensor_msgs/Imu
#   /dvl/velocity      geometry_msgs/TwistWithCovarianceStamped
#   /depth/data        sensor_msgs/FluidPressure (or Float64)
#
# Output: /odometry/filtered  nav_msgs/Odometry

ekf_node:
  ros__parameters:

    frequency: 30.0
    sensor_timeout: 0.1
    two_d_mode: false
    publish_tf: true
    map_frame: map
    odom_frame: odom
    base_link_frame: base_link
    world_frame: odom

    # ── IMU (ICM45686) ────────────────────────────────────────────────────────
    # Provides: orientation, angular velocity, linear acceleration
    imu0: /imu/data
    imu0_config: [false, false, false,   # x, y, z position
                  true,  true,  true,    # roll, pitch, yaw
                  false, false, false,   # vx, vy, vz
                  true,  true,  true,    # vroll, vpitch, vyaw
                  true,  true,  true]    # ax, ay, az
    imu0_differential: false
    imu0_relative: false
    imu0_remove_gravitational_acceleration: true

    # ── DVL (Cerulean Tracker 650) ────────────────────────────────────────────
    # Provides: body-frame velocity
    twist0: /dvl/velocity
    twist0_config: [false, false, false,   # x, y, z position
                    false, false, false,   # roll, pitch, yaw
                    true,  true,  true,    # vx, vy, vz
                    false, false, false,   # vroll, vpitch, vyaw
                    false, false, false]   # ax, ay, az
    twist0_differential: false

    # ── Depth sensor ──────────────────────────────────────────────────────────
    # Provides: z position (depth)
    # Note: remap your depth topic to pose0 with z only enabled
    pose0: /depth/pose
    pose0_config: [false, false, true,    # x, y, z position (depth only)
                   false, false, false,   # roll, pitch, yaw
                   false, false, false,   # vx, vy, vz
                   false, false, false,   # vroll, vpitch, vyaw
                   false, false, false]   # ax, ay, az
    pose0_differential: false
